name: SkyWatchSWO Auto-Post

on:
  schedule:
    # Runs every 6 hours (adjust the cron schedule as needed)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  post-weather:
    runs-on: ubuntu-latest
    
    # Required for the script to push generated images back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Auto-Poster
        env:
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python main.py
